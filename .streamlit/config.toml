[theme]
primaryColor        = "#F06A00"
backgroundColor     = "#080c12"
secondaryBackgroundColor = "#0e1420"
textColor           = "#e2e8f0"
font                = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 50

[browser]
gatherUsageStats    = false

[logger]
level               = "warning"
