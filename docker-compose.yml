version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: retail_brain_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-retail_brain}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-retail_brain_2025}
      POSTGRES_DB: ${DB_NAME:-retail_brain}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_brain"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Retail Brain Application ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retail_brain_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-retail_brain}:${DB_PASSWORD:-retail_brain_2025}@db:5432/${DB_NAME:-retail_brain}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "8501:8501"   # Streamlit Dashboard
      - "8000:8000"   # FastAPI API
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs

  # ── pgAdmin (optional — for DB management) ──────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: retail_brain_pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@retailbrain.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"

volumes:
  pgdata:
    driver: local
